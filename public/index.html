<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StageCall — Competition Scheduler</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: { extend: {
        colors: {
          bg:'#0c0e1f', surface:'#111325', raised:'#181a30', edge:'#21233c',
          gold:'#d9a84c', bloom:'#e87882', glow:'#7c6de8',
          ink:'#ece9f8', ghost:'#5e5c82'
        },
        fontFamily: { display:["'Cinzel'","serif"], body:["'Outfit'","sans-serif"] }
      }}
    };
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *,*::before,*::after{font-family:'Outfit',sans-serif;box-sizing:border-box;}
    body{background:#0c0e1f;color:#ece9f8;min-height:100vh;margin:0;}
    .font-display{font-family:'Cinzel',serif;}
    ::-webkit-scrollbar{width:5px;}
    ::-webkit-scrollbar-track{background:#0c0e1f;}
    ::-webkit-scrollbar-thumb{background:#21233c;border-radius:3px;}

    #bg-aura{position:fixed;inset:0;pointer-events:none;z-index:0;
      background:radial-gradient(ellipse 60% 50% at 15% 10%,rgba(124,109,232,.12) 0%,transparent 70%),
                 radial-gradient(ellipse 40% 30% at 85% 90%,rgba(232,120,130,.1) 0%,transparent 70%);}

    .glass{background:rgba(17,19,37,.8);backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,.06);}
    .glass-light{background:rgba(24,26,48,.6);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.07);}

    #nav{position:fixed;top:0;left:0;right:0;z-index:100;height:60px;
      background:rgba(7,9,23,.92);backdrop-filter:blur(20px);
      border-bottom:1px solid rgba(255,255,255,.05);}

    .inp{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.09);
      border-radius:8px;color:#ece9f8;padding:10px 14px;width:100%;transition:border-color .2s;}
    .inp:focus{outline:none;border-color:rgba(217,168,76,.5);}
    .inp::placeholder{color:rgba(236,233,248,.25);}
    select.inp option{background:#181a30;}

    .btn-gold{background:linear-gradient(135deg,#d9a84c,#c89038);color:#0c0e1f;font-weight:600;
      padding:10px 20px;border-radius:8px;border:none;cursor:pointer;
      transition:opacity .2s,transform .1s;display:inline-flex;align-items:center;gap:6px;}
    .btn-gold:hover{opacity:.9;transform:translateY(-1px);}
    .btn-ghost{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);
      color:#ece9f8;padding:9px 18px;border-radius:8px;cursor:pointer;
      transition:background .2s;display:inline-flex;align-items:center;gap:6px;}
    .btn-ghost:hover{background:rgba(255,255,255,.1);}
    .btn-sm{padding:7px 14px;font-size:13px;}
    .btn-xs{padding:5px 10px;font-size:12px;}
    .btn-icon{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.07);
      color:#ece9f8;width:32px;height:32px;border-radius:7px;cursor:pointer;
      display:inline-flex;align-items:center;justify-content:center;transition:all .2s;}
    .btn-icon:hover{background:rgba(255,255,255,.1);}
    .btn-icon.edit:hover{color:#d9a84c;border-color:rgba(217,168,76,.3);background:rgba(217,168,76,.08);}
    .btn-icon.del:hover{color:#e87882;border-color:rgba(232,120,130,.3);background:rgba(232,120,130,.08);}

    .shift-btn{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);
      color:#ece9f8;padding:6px 12px;border-radius:7px;cursor:pointer;font-size:12px;font-weight:600;
      transition:all .2s;display:inline-flex;align-items:center;gap:4px;white-space:nowrap;}
    .shift-btn:hover{background:rgba(217,168,76,.12);border-color:rgba(217,168,76,.3);color:#d9a84c;}
    .shift-btn.minus:hover{background:rgba(232,120,130,.1);border-color:rgba(232,120,130,.3);color:#e87882;}

    .tab{padding:12px 20px;cursor:pointer;border-bottom:2px solid transparent;
      color:#5e5c82;transition:all .2s;font-weight:500;font-size:14px;}
    .tab:hover{color:#ece9f8;}
    .tab.active{color:#d9a84c;border-bottom-color:#d9a84c;}

    .r-row{display:grid;grid-template-columns:90px 1fr auto;gap:12px;align-items:center;
      padding:14px 16px;border-radius:10px;transition:background .15s;}
    .r-row:hover{background:rgba(255,255,255,.025);}
    .r-row.on-now{background:rgba(217,168,76,.06);border:1px solid rgba(217,168,76,.15);}
    @media(max-width:600px){.r-row{grid-template-columns:75px 1fr;}
      .r-actions{grid-column:2;justify-self:end;margin-top:4px;}}

    .badge{display:inline-block;font-size:10px;font-weight:700;letter-spacing:.5px;
      text-transform:uppercase;padding:3px 8px;border-radius:999px;}
    .b-ballet{background:rgba(100,140,230,.15);color:#90b0f8;}
    .b-jazz{background:rgba(240,180,60,.15);color:#f0c840;}
    .b-hiphop{background:rgba(80,200,120,.15);color:#60d898;}
    .b-contemp{background:rgba(80,200,200,.15);color:#60d8e0;}
    .b-lyrical{background:rgba(220,100,180,.15);color:#e880d8;}
    .b-tap{background:rgba(240,140,60,.15);color:#f0a040;}
    .b-acro{background:rgba(160,100,240,.15);color:#c090f8;}
    .b-musical{background:rgba(100,200,80,.15);color:#80d860;}
    .b-default{background:rgba(255,255,255,.08);color:#9898b8;}

    .stage-pill{font-size:11px;font-weight:600;padding:3px 8px;border-radius:6px;}

    .upload-zone{border:2px dashed rgba(255,255,255,.1);border-radius:12px;padding:40px;
      text-align:center;transition:all .2s;cursor:pointer;}
    .upload-zone:hover,.upload-zone.drag-over{border-color:rgba(217,168,76,.4);background:rgba(217,168,76,.04);}
    .upload-zone-sm{border:2px dashed rgba(255,255,255,.1);border-radius:12px;padding:24px;
      text-align:center;transition:all .2s;cursor:pointer;}
    .upload-zone-sm:hover,.upload-zone-sm.drag-over{border-color:rgba(124,109,232,.4);background:rgba(124,109,232,.04);}

    .media-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px;}
    .media-card{position:relative;aspect-ratio:1;border-radius:10px;overflow:hidden;
      cursor:pointer;background:#181a30;transition:transform .2s;}
    .media-card:hover{transform:scale(1.03);}
    .media-card img,.media-card video{width:100%;height:100%;object-fit:cover;}
    .media-over{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.6) 0%,transparent 50%);}

    .chip{font-size:11px;font-weight:700;letter-spacing:.3px;padding:3px 8px;border-radius:6px;display:inline-block;}
    .chip-live{background:rgba(217,168,76,.2);color:#d9a84c;animation:blink 1.5s infinite;}
    .chip-soon{background:rgba(124,109,232,.15);color:#9080e8;}
    .chip-past{background:rgba(255,255,255,.05);color:#5e5c82;}
    @keyframes blink{0%,100%{opacity:1;}50%{opacity:.5;}}

    .modal-wrap{position:fixed;inset:0;z-index:200;display:flex;align-items:center;
      justify-content:center;padding:16px;}
    .modal-bg{position:absolute;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(6px);}
    .modal-box{position:relative;z-index:1;background:#111325;
      border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:28px;
      width:100%;max-width:540px;max-height:92vh;overflow-y:auto;animation:mIn .25s ease;}
    .modal-box::-webkit-scrollbar{width:4px;}
    .modal-box::-webkit-scrollbar-thumb{background:#21233c;}
    @keyframes mIn{from{transform:scale(.95) translateY(10px);opacity:0;}to{transform:scale(1) translateY(0);opacity:1;}}

    #alert-bar{position:fixed;top:60px;left:0;right:0;z-index:99;
      background:linear-gradient(90deg,rgba(217,168,76,.15),rgba(232,120,130,.1));
      border-bottom:1px solid rgba(217,168,76,.2);backdrop-filter:blur(12px);
      padding:12px 20px;animation:slideD .4s ease;}
    @keyframes slideD{from{transform:translateY(-100%);}to{transform:translateY(0);}}

    .toast{padding:12px 18px;border-radius:10px;font-size:14px;font-weight:500;min-width:220px;
      animation:tIn .3s ease;box-shadow:0 8px 24px rgba(0,0,0,.4);}
    .t-success{background:rgba(93,217,154,.15);border:1px solid rgba(93,217,154,.3);color:#5dd99a;}
    .t-error{background:rgba(232,120,130,.15);border:1px solid rgba(232,120,130,.3);color:#e87882;}
    .t-info{background:rgba(124,109,232,.15);border:1px solid rgba(124,109,232,.3);color:#9080e8;}
    @keyframes tIn{from{transform:translateX(40px);opacity:0;}to{transform:translateX(0);opacity:1;}}

    .event-card{background:#111325;border:1px solid rgba(255,255,255,.07);border-radius:14px;
      padding:22px;cursor:pointer;transition:all .2s;}
    .event-card:hover{border-color:rgba(217,168,76,.25);background:#161830;
      transform:translateY(-2px);box-shadow:0 8px 32px rgba(0,0,0,.3);}

    .viewer-media{max-height:78vh;max-width:100%;border-radius:10px;object-fit:contain;}

    label{display:block;}
    .form-label{font-size:11px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;
      color:#5e5c82;margin-bottom:8px;}

    .slug-prefix{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.09);
      border-right:none;border-radius:8px 0 0 8px;padding:10px 12px;color:#5e5c82;
      font-size:13px;white-space:nowrap;display:flex;align-items:center;}
    .slug-input{border-radius:0 8px 8px 0 !important;border-left:1px solid rgba(255,255,255,.09);}

    .uploader-tag{font-size:10px;font-weight:600;padding:2px 7px;border-radius:5px;
      background:rgba(124,109,232,.15);color:#9080e8;}

    /* Awards */
    .award-pill{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:700;
      letter-spacing:.3px;padding:3px 9px;border-radius:999px;border:1px solid;}
    .award-platinum{background:rgba(200,220,255,.1);border-color:rgba(200,220,255,.3);color:#c8dcff;}
    .award-high-gold{background:rgba(255,215,80,.12);border-color:rgba(255,215,80,.35);color:#ffd750;}
    .award-gold{background:rgba(217,168,76,.12);border-color:rgba(217,168,76,.35);color:#d9a84c;}
    .award-high-silver{background:rgba(210,220,235,.1);border-color:rgba(210,220,235,.3);color:#d2dce8;}
    .award-silver{background:rgba(180,190,200,.1);border-color:rgba(180,190,200,.3);color:#b4bec8;}
    .award-high-bronze{background:rgba(205,140,80,.1);border-color:rgba(205,140,80,.3);color:#cd8c50;}
    .award-bronze{background:rgba(180,110,60,.1);border-color:rgba(180,110,60,.3);color:#b46e3c;}
    .award-custom{background:rgba(124,109,232,.1);border-color:rgba(124,109,232,.3);color:#9080e8;}

    .award-tag-rm{cursor:pointer;opacity:.5;font-size:12px;line-height:1;margin-left:2px;}
    .award-tag-rm:hover{opacity:1;}
    .award-entry{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.04);
      border:1px solid rgba(255,255,255,.08);border-radius:8px;padding:8px 12px;}
  </style>
</head>
<body>
<div id="bg-aura"></div>

<!-- NAV -->
<nav id="nav">
  <div class="max-w-5xl mx-auto h-full flex items-center justify-between px-4">
    <div class="flex items-center gap-3">
      <button id="btn-back" class="btn-icon hidden" onclick="goHome()">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
      </button>
      <span class="font-display text-xl font-bold tracking-widest cursor-pointer" style="color:#d9a84c" onclick="goHome()">STAGECALL</span>
    </div>
  </div>
</nav>

<!-- ALERT BANNER -->
<div id="alert-bar" class="hidden">
  <div class="max-w-5xl mx-auto flex items-center justify-between gap-4">
    <div class="flex items-center gap-3 min-w-0">
      <span class="text-2xl shrink-0">⏰</span>
      <div class="min-w-0">
        <span class="font-bold text-gold" id="ab-name"></span>
        <span class="text-white/70 text-sm ml-2" id="ab-detail"></span>
      </div>
    </div>
    <button onclick="closeAlert()" class="text-white/40 hover:text-white shrink-0 text-lg leading-none">✕</button>
  </div>
</div>

<!-- SEATED ALERT BANNER -->
<div id="seated-bar" class="hidden" style="position:fixed;top:60px;left:0;right:0;z-index:98;
  background:linear-gradient(90deg,rgba(124,109,232,.18),rgba(80,200,200,.1));
  border-bottom:1px solid rgba(124,109,232,.25);backdrop-filter:blur(12px);
  padding:12px 20px;animation:slideD .4s ease;">
  <div class="max-w-5xl mx-auto flex items-center justify-between gap-4">
    <div class="flex items-center gap-3 min-w-0">
      <span class="text-2xl shrink-0">🪑</span>
      <div class="min-w-0">
        <span class="font-bold" style="color:#9080e8" id="sa-name"></span>
        <span class="text-white/60 text-sm ml-2" id="sa-detail"></span>
      </div>
    </div>
    <button onclick="closeSeatedAlert()" class="text-white/40 hover:text-white shrink-0 text-lg leading-none">✕</button>
  </div>
</div>

<!-- MAIN -->
<main class="relative z-10 pt-16 max-w-5xl mx-auto px-4 pb-20">

  <!-- HOME VIEW -->
  <div id="view-home" class="view">
    <div class="flex items-center justify-between py-8 gap-4 flex-wrap">
      <div>
        <h1 class="font-display text-3xl font-bold tracking-wide" style="color:#d9a84c">Competition Schedule</h1>
        <p class="text-ghost mt-1 text-sm">Manage and share your dancer's routine schedules</p>
      </div>
      <button class="btn-gold" onclick="openEventModal(null)">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg>
        New Event
      </button>
    </div>
    <div id="events-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4"></div>
    <div id="events-empty" class="hidden text-center py-24">
      <div class="text-6xl mb-4">🎭</div>
      <p class="font-display text-xl text-ghost font-semibold">No competitions yet</p>
      <p class="text-ghost text-sm mt-2">Create your first event to get started</p>
      <button class="btn-gold mt-6" onclick="openEventModal(null)">Create Your First Event</button>
    </div>
  </div>

  <!-- EVENT VIEW -->
  <div id="view-event" class="view hidden">
    <div id="event-hdr" class="py-7 border-b border-edge/50"></div>
    <div class="flex border-b border-edge/40 gap-1 overflow-x-auto">
      <button class="tab active" data-tab="schedule" onclick="switchTab('schedule')">Schedule</button>
      <button class="tab" data-tab="media"    onclick="switchTab('media')">Media</button>
      <button class="tab" data-tab="settings" onclick="switchTab('settings')">Settings</button>
    </div>
    <div id="tab-schedule" class="tab-pane py-5"></div>
    <div id="tab-media"    class="tab-pane py-5 hidden"></div>
    <div id="tab-settings" class="tab-pane py-5 hidden"></div>
  </div>

  <!-- SHARE VIEW -->
  <div id="view-share" class="view hidden pt-0 -mx-4"></div>

</main>

<!-- FOOTER -->
<footer class="relative z-10 border-t border-white/5 py-5 px-4">
  <div class="max-w-5xl mx-auto flex justify-center">
    <a href="https://ko-fi.com/workhardbekind" target="_blank" rel="noopener noreferrer" class="inline-flex items-center gap-2 text-xs text-zinc-400 hover:text-zinc-600 transition-colors"><svg class="w-3.5 h-3.5 text-[#FF5E5B]" viewBox="0 0 24 24" fill="currentColor"><path d="M23.881 8.948c-.773-4.085-4.859-4.593-4.859-4.593H.723c-.604 0-.679.798-.679.798s-.082 7.324-.022 11.822c.164 2.424 2.586 2.672 2.586 2.672s8.267-.023 11.966-.049c2.438-.426 2.683-2.566 2.658-3.734 4.352.24 7.422-2.831 6.649-6.916zm-11.062 3.511c-1.246 1.453-4.011 3.976-4.011 3.976s-.121.119-.31.023c-.076-.057-.108-.09-.108-.09-.443-.441-3.368-3.049-4.034-3.954-.709-.965-1.041-2.7-.091-3.71.951-1.01 3.005-1.086 4.363.407 0 0 1.565-1.782 3.468-.963 1.904.82 1.832 2.655.723 4.311zm6.173.478c-.928.116-1.682.028-1.682.028V7.284h1.77s1.971.551 1.971 2.638c0 1.913-.985 2.667-2.059 3.015z"></path></svg>Buy Dave a coffee</a>
  </div>
</footer>

<!-- TOASTS -->
<div id="toasts" class="fixed bottom-6 right-4 z-[300] flex flex-col gap-2 pointer-events-none"></div>

<!-- MODAL: Event -->
<div id="m-event" class="modal-wrap hidden">
  <div class="modal-bg" onclick="closeEventModal()"></div>
  <div class="modal-box">
    <h2 class="font-display text-xl font-semibold mb-6" id="em-title">New Competition</h2>
    <div class="flex flex-col gap-4">
      <div>
        <label class="form-label">Event Name *</label>
        <input class="inp" id="em-name" placeholder="Spring Showcase 2025" />
      </div>
      <div class="grid grid-cols-2 gap-3">
        <div>
          <label class="form-label">Date</label>
          <input type="date" class="inp" id="em-date" />
        </div>
        <div>
          <label class="form-label">Venue</label>
          <input class="inp" id="em-venue" placeholder="City Arts Center" />
        </div>
      </div>
      <div>
        <label class="form-label">Notes / Description</label>
        <textarea class="inp" id="em-desc" rows="2" placeholder="Parking info, dress code…"></textarea>
      </div>
    </div>
    <div class="flex justify-end gap-2 mt-6">
      <button class="btn-ghost btn-sm" onclick="closeEventModal()">Cancel</button>
      <button class="btn-gold btn-sm" onclick="saveEvent()">Save Event</button>
    </div>
  </div>
</div>

<!-- MODAL: Routine -->
<div id="m-routine" class="modal-wrap hidden">
  <div class="modal-bg" onclick="closeRoutineModal()"></div>
  <div class="modal-box">
    <h2 class="font-display text-xl font-semibold mb-6" id="rm-title">Add Routine</h2>
    <div class="flex flex-col gap-4">
      <div>
        <label class="form-label">Dancer Name *</label>
        <input class="inp" id="rm-name" placeholder="First Last" />
      </div>
      <div class="grid grid-cols-2 gap-3">
        <div>
          <label class="form-label">Studio</label>
          <input class="inp" id="rm-studio" placeholder="Studio Name" />
        </div>
        <div>
          <label class="form-label">Age</label>
          <input type="number" class="inp" id="rm-age" placeholder="12" min="1" max="99" />
        </div>
        <div>
          <label class="form-label">Dance Style</label>
          <select class="inp" id="rm-style">
            <option value="">— Select —</option>
            <option>Ballet</option><option>Jazz</option><option>Hip Hop</option>
            <option>Contemporary</option><option>Lyrical</option><option>Tap</option>
            <option>Acro</option><option>Musical Theater</option><option>Other</option>
          </select>
        </div>
        <div>
          <label class="form-label">Order #</label>
          <input type="number" class="inp" id="rm-order" placeholder="5" min="1" />
        </div>
        <div>
          <label class="form-label">Scheduled Time *</label>
          <input type="datetime-local" class="inp" id="rm-time" />
        </div>
        <div>
          <label class="form-label">Stage / Room</label>
          <input class="inp" id="rm-stage" placeholder="Main Stage" />
        </div>
      </div>
      <div>
        <label class="form-label">Notes</label>
        <textarea class="inp" id="rm-notes" rows="2" placeholder="Costume, warm-up time…"></textarea>
      </div>
      <div>
        <label class="form-label">Awards</label>
        <div class="flex gap-2 mb-2">
          <select class="inp" id="rm-award-level" style="flex:1">
            <option value="">— Level —</option>
            <option value="Platinum">🏆 Platinum</option>
            <option value="High Gold">🥇 High Gold</option>
            <option value="Gold">🥇 Gold</option>
            <option value="High Silver">🥈 High Silver</option>
            <option value="Silver">🥈 Silver</option>
            <option value="High Bronze">🥉 High Bronze</option>
            <option value="Bronze">🥉 Bronze</option>
            <option value="Custom">✨ Custom</option>
          </select>
          <input class="inp" id="rm-award-title" placeholder="e.g. Best Costume, Overall…" style="flex:2" />
          <button type="button" class="btn-ghost btn-sm shrink-0" onclick="addAwardToList()">+ Add</button>
        </div>
        <div id="rm-awards-list" class="flex flex-col gap-2"></div>
      </div>
    </div>
    <div class="flex justify-end gap-2 mt-6">
      <button class="btn-ghost btn-sm" onclick="closeRoutineModal()">Cancel</button>
      <button class="btn-gold btn-sm" onclick="saveRoutine()">Save Routine</button>
    </div>
  </div>
</div>

<!-- MODAL: Media Viewer -->
<div id="m-viewer" class="modal-wrap hidden" onclick="closeViewer()">
  <div class="modal-bg"></div>
  <div class="relative z-10 flex flex-col items-center gap-3 w-full max-w-4xl" onclick="event.stopPropagation()">
    <button onclick="closeViewer()" class="btn-icon self-end">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 6 6 18M6 6l12 12"/></svg>
    </button>

<script src="/socket.io/socket.io.js"></script>
<script>
// ─── Registry ─────────────────────────────────────────────────────────────────
const R = {};
function reg(obj){ const k='r'+Math.random().toString(36).slice(2); R[k]=obj; return k; }
function r(k){ return R[k]; }

// ─── State ────────────────────────────────────────────────────────────────────
const S = {
  view:'home', events:[], currentEvent:null,
  routines:[], media:[], settings:{},
  tab:'schedule', editEventId:null, editRoutineId:null,
  viewerMedia:[], viewerIdx:0,
  shareKey: null,  // token or slug for current share view
  shifting: false  // true while a schedule shift is in progress
};

// ─── API ──────────────────────────────────────────────────────────────────────
async function apiFetch(method, url, body){
  const opts = {method, headers:{'Content-Type':'application/json'}};
  if(body) opts.body = JSON.stringify(body);
  const res = await fetch(url, opts);
  return res.json();
}
async function apiUpload(url, formData){
  const res = await fetch(url, {method:'POST', body:formData});
  return res.json();
}

// ─── Formatters ───────────────────────────────────────────────────────────────
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function fmtTime(iso){ if(!iso) return '—'; return new Date(iso).toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'}); }
function fmtDate(iso){
  if(!iso) return '';
  const [y,m,d] = iso.split('T')[0].split('-');
  return new Date(+y,+m-1,+d).toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric',year:'numeric'});
}
function toLocalInput(iso){
  if(!iso) return '';
  const d=new Date(iso);
  const p=n=>String(n).padStart(2,'0');
  return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())}T${p(d.getHours())}:${p(d.getMinutes())}`;
}
function fmtSize(bytes){
  if(bytes>1073741824) return (bytes/1073741824).toFixed(1)+'GB';
  if(bytes>1048576)    return (bytes/1048576).toFixed(1)+'MB';
  return (bytes/1024).toFixed(0)+'KB';
}
function styleBadge(s){
  const map={Ballet:'ballet',Jazz:'jazz','Hip Hop':'hiphop',Contemporary:'contemp',
             Lyrical:'lyrical',Tap:'tap',Acro:'acro','Musical Theater':'musical'};
  return `<span class="badge b-${map[s]||'default'}">${esc(s)}</span>`;
}
function stagePill(s){
  if(!s) return '';
  const palettes=[
    ['rgba(124,109,232,.15)','#9080e8'],['rgba(232,120,130,.15)','#e87882'],
    ['rgba(80,200,200,.15)','#60d8e0'],['rgba(93,217,154,.15)','#5dd99a'],
    ['rgba(217,168,76,.15)','#d9a84c'],['rgba(200,100,80,.15)','#e07060']
  ];
  const [bg,col]=palettes[s.charCodeAt(0)%palettes.length];
  return `<span class="stage-pill" style="background:${bg};color:${col}">${esc(s)}</span>`;
}
function awardClass(level){
  const map={'Platinum':'platinum','High Gold':'high-gold','Gold':'gold',
    'High Silver':'high-silver','Silver':'silver','High Bronze':'high-bronze','Bronze':'bronze'};
  return 'award-'+(map[level]||'custom');
}
function awardEmoji(level){
  const map={'Platinum':'🏆','High Gold':'🥇','Gold':'🥇','High Silver':'🥈',
    'Silver':'🥈','High Bronze':'🥉','Bronze':'🥉','Custom':'✨'};
  return map[level]||'🏅';
}
function awardPills(awards, removable=false){
  if(!awards||!awards.length) return '';
  return awards.map((a,i)=>
    `<span class="award-pill ${awardClass(a.level)}">
      ${awardEmoji(a.level)} ${esc(a.level)}${a.title?' · '+esc(a.title):''}
      ${removable?`<span class="award-tag-rm" onclick="removeAward(${i})" title="Remove">✕</span>`:''}
    </span>`
  ).join('');
}
function countdownChip(iso){
  if(!iso) return `<span class="chip chip-past">—</span>`;
  const diff=new Date(iso)-Date.now();
  if(diff<-600000) return `<span class="chip chip-past">${esc(fmtTime(iso))}</span>`;
  if(diff>=-600000&&diff<=600000) return `<span class="chip chip-live">ON NOW</span>`;
  if(diff>0&&diff<86400000){
    const h=Math.floor(diff/3600000),m=Math.floor((diff%3600000)/60000),s=Math.floor((diff%60000)/1000);
    return `<span class="chip chip-soon" data-cd="${esc(iso)}">${h?h+'h ':''} ${m}m ${s}s</span>`;
  }
  return `<span class="chip chip-past">${esc(fmtTime(iso))}</span>`;
}
function isToday(iso){ return iso&&new Date(iso).toDateString()===new Date().toDateString(); }

// ─── Countdown ticker ─────────────────────────────────────────────────────────
setInterval(()=>{
  document.querySelectorAll('[data-cd]').forEach(el=>{
    const diff=new Date(el.dataset.cd)-Date.now();
    if(diff<=0){el.textContent='ON NOW';el.className='chip chip-live';return;}
    if(diff>86400000) return;
    const h=Math.floor(diff/3600000),m=Math.floor((diff%3600000)/60000),s=Math.floor((diff%60000)/1000);
    el.textContent=`${h?h+'h ':''} ${m}m ${s}s`;
  });
},1000);

// ─── Toast ────────────────────────────────────────────────────────────────────
function toast(msg,type='info'){
  const el=document.createElement('div');
  el.className=`toast t-${type} pointer-events-auto`;
  el.textContent=msg;
  const c=document.getElementById('toasts');
  c.appendChild(el);
  setTimeout(()=>{el.style.opacity='0';el.style.transition='opacity .4s';setTimeout(()=>el.remove(),400);},3800);
}

// ─── Alert banner ─────────────────────────────────────────────────────────────
let alertTimer;
function showAlert(d){
  document.getElementById('ab-name').textContent=`${d.dancerName} performs in 15 minutes!`;
  document.getElementById('ab-detail').textContent=`${d.danceStyle||'Routine'} · ${d.stage||''} · ${fmtTime(d.scheduledTime)}${d.eventName?' · '+d.eventName:''}`;
  document.getElementById('alert-bar').classList.remove('hidden');
  clearTimeout(alertTimer);
  alertTimer=setTimeout(closeAlert,45000);
}
function closeAlert(){ document.getElementById('alert-bar').classList.add('hidden'); }

// ─── Seated alert banner ──────────────────────────────────────────────────────
let seatedTimer;
function showSeatedAlert(name, detail) {
  document.getElementById('sa-name').textContent = `${name} is seated!`;
  document.getElementById('sa-detail').textContent = detail;
  const bar = document.getElementById('seated-bar');
  bar.classList.remove('hidden');
  clearTimeout(seatedTimer);
  seatedTimer = setTimeout(() => bar.classList.add('hidden'), 30000);
}
function closeSeatedAlert() { document.getElementById('seated-bar').classList.add('hidden'); }

// ─── Socket.io ────────────────────────────────────────────────────────────────
const socket=io();
socket.on('data-updated',async()=>{
  if(S.shifting) return; // local optimistic update already applied
  if(S.view==='home'){await loadEvents();renderHome();}
  if(S.view==='event'){await loadEventData(S.currentEvent.id);renderEventView();}
  if(S.view==='share'){await loadShareView(S.shareKey);}
});
socket.on('routine-alert',d=>{ showAlert(d); toast(`⏰ ${d.dancerName} on in 15 min!`,'info'); });
socket.on('seated-alert', d => {
  const nextMsg = d.nextRoutine ? ` · Next: ${d.nextRoutine.dancerName}` : '';
  showSeatedAlert(d.senderName, d.eventName + nextMsg);
  toast(`🪑 ${d.senderName} is seated!`, 'info');
});

async function loadEvents(){ S.events=await apiFetch('GET','/api/events'); }

async function shiftSchedule(minutes){
  if(S.shifting) return;
  const label = minutes > 0 ? `+${minutes}` : `${minutes}`;
  const unit  = Math.abs(minutes) === 60 ? 'hour' : 'min';
  const ms    = minutes * 60 * 1000;

  // Snapshot for rollback
  const snapshot = S.routines.map(r => ({...r}));

  // 1. Apply optimistically to local state & re-render immediately
  S.shifting = true;
  S.routines = S.routines.map(r => {
    if(!r.scheduledTime) return r;
    return {...r, scheduledTime: new Date(new Date(r.scheduledTime).getTime() + ms).toISOString()};
  });
  renderSchedule();

  // 2. Confirm with server
  try {
    const result = await apiFetch('POST', `/api/events/${S.currentEvent.id}/shift`, {minutes});
    if(result.ok){
      toast(`⏱ Shifted ${label} ${unit} — ${result.changed} routine${result.changed!==1?'s':''} updated`, 'success');
    } else {
      // Rollback
      S.routines = snapshot;
      renderSchedule();
      toast(result.error || 'Shift failed', 'error');
    }
  } catch(e) {
    S.routines = snapshot;
    renderSchedule();
    toast('Shift failed — please try again', 'error');
  } finally {
    S.shifting = false;
  }
}

function routineRow(r){
  const today=isToday(r.scheduledTime);

        ${r.stage?stagePill(r.stage):''}

      ${r.awards&&r.awards.length?`<div class="flex flex-wrap gap-1 mt-2">${awardPills(r.awards)}</div>`:''}
      ${r.notes?`<p class="text-xs text-ghost mt-1 truncate italic">${esc(r.notes)}</p>`:''}

    <div class="r-actions flex items-center gap-1.5 shrink-0">

      </button>
      <button class="btn-icon del" onclick="deleteRoutine('${r.id}')">

      </button>
    </div>
  </div>`;
}

// ─── Custom slug ──────────────────────────────────────────────────────────────
async function saveSlug(){
  const slug=document.getElementById('slug-inp').value.trim();
  const result=await apiFetch('PUT',`/api/events/${S.currentEvent.id}`,{shareSlug:slug});
  if(result.error){ toast(result.error,'error'); return; }
  S.currentEvent=result;
  // Update the events list too
  const i=S.events.findIndex(e=>e.id===result.id);
  if(i>=0) S.events[i]=result;
  toast(slug?`Slug saved: /share/${slug}`:'Slug cleared','success');
  renderSettings();
  // Update nav share button
  const shareKey=result.shareSlug||result.shareToken;
  document.getElementById('nav-actions').innerHTML=`
    <button class="btn-ghost btn-sm" onclick="copyShare('${shareKey}')">🔗 Share</button>`;
}
async function clearSlug(){
  const result=await apiFetch('PUT',`/api/events/${S.currentEvent.id}`,{shareSlug:''});
  if(result.error){toast(result.error,'error');return;}
  S.currentEvent=result;
  toast('Custom slug cleared','info');
  renderSettings();
}

// Public upload handlers
function handleShareDrop(e,key){
  e.preventDefault();
  document.getElementById('pub-upload-zone').classList.remove('drag-over');
  shareUploadFiles(e.dataTransfer.files,key);
}
async function shareUploadFiles(files,key){
  const arr=Array.from(files); if(!arr.length) return;
  const uploaderName=(document.getElementById('pub-name')?.value.trim())||'Guest';
  const caption=(document.getElementById('pub-caption')?.value.trim())||'';
  const prog=document.getElementById('pub-prog');
  const bar=document.getElementById('pub-prog-bar');
  const txt=document.getElementById('pub-prog-txt');
  prog.classList.remove('hidden');
  let uploaded=0;
  for(let i=0;i<arr.length;i++){
    txt.textContent=`Uploading ${i+1} of ${arr.length}: ${arr[i].name}`;
    bar.style.width=`${Math.round(i/arr.length*100)}%`;
    const fd=new FormData();
    fd.append('file',arr[i]);
    fd.append('uploaderName',uploaderName);
    fd.append('caption',i===0?caption:'');
    try{
      const item=await apiUpload(`/api/share/${key}/media`,fd);
      if(item.id) uploaded++;
    }catch(e){ toast(`Failed: ${arr[i].name}`,'error'); }
  }
  bar.style.width='100%';
  txt.textContent=`✓ ${uploaded} file${uploaded!==1?'s':''} uploaded!`;
  setTimeout(()=>prog.classList.add('hidden'),3000);
  toast(`${uploaded} file${uploaded!==1?'s':''} shared! 🎉`,'success');
  // Reload the share view to show new media
  await loadShareView(key);
}

// ─── Media viewer ─────────────────────────────────────────────────────────────
function openViewer(i){ S.viewerMedia=S.media; S.viewerIdx=i; _showViewer(); }
function openShareViewer(i){ S.viewerIdx=i; _showViewer(); }
function closeViewer(){ document.getElementById('m-viewer').classList.add('hidden'); }
function stepViewer(dir){
  S.viewerIdx=(S.viewerIdx+dir+S.viewerMedia.length)%S.viewerMedia.length;
  _showViewer();
}
function _showViewer(){
  const m=S.viewerMedia[S.viewerIdx];
  if(!m) return;
  const src=`/uploads/${m.filename}`;
  document.getElementById('viewer-cnt').innerHTML=
    m.type==='video'
      ?`<video src="${src}" controls class="viewer-media" style="max-height:72vh"></video>`
      :`<img src="${src}" alt="${esc(m.caption||m.originalName)}" class="viewer-media" />`;
  document.getElementById('viewer-cap').textContent=m.caption||m.originalName;
  document.getElementById('viewer-by').textContent=m.uploadedBy&&m.uploadedBy!=='Host'?`Uploaded by ${m.uploadedBy}`:'';
  document.getElementById('viewer-pg').textContent=`${S.viewerIdx+1} / ${S.viewerMedia.length}`;
  document.getElementById('m-viewer').classList.remove('hidden');
}

// ─── Admin file upload ────────────────────────────────────────────────────────
function handleDrop(e){
  e.preventDefault();
  document.getElementById('upload-zone').classList.remove('drag-over');
  uploadFiles(e.dataTransfer.files,'admin');
}
async function uploadFiles(files,mode){
  const arr=Array.from(files); if(!arr.length) return;
  const prog=document.getElementById('upload-prog');
  const bar=document.getElementById('prog-bar');
  const txt=document.getElementById('prog-txt');
  prog.classList.remove('hidden');
  for(let i=0;i<arr.length;i++){
    txt.textContent=`Uploading ${i+1} of ${arr.length}: ${arr[i].name}`;
    bar.style.width=`${Math.round(i/arr.length*100)}%`;
    const fd=new FormData(); fd.append('file',arr[i]);
    try{
      const item=await apiUpload(`/api/events/${S.currentEvent.id}/media`,fd);
      if(item.id) S.media.unshift(item);
    }catch(e){ toast(`Failed: ${arr[i].name}`,'error'); }
  }
  bar.style.width='100%';
  txt.textContent=`✓ ${arr.length} file${arr.length!==1?'s':''} uploaded`;
  setTimeout(()=>{prog.classList.add('hidden');bar.style.width='0%';},2500);
  renderMedia();
  toast(`Uploaded ${arr.length} file${arr.length!==1?'s':''}!`,'success');
}

// ─── Event modal ──────────────────────────────────────────────────────────────
function openEventModal(k){
  const ev=k?r(k):null;
  S.editEventId=ev?ev.id:null;
  document.getElementById('em-title').textContent=ev?'Edit Event':'New Competition';
  document.getElementById('em-name').value=ev?ev.name:'';
  document.getElementById('em-date').value=ev?ev.date||'':'';
  document.getElementById('em-venue').value=ev?ev.venue||'':'';
  document.getElementById('em-desc').value=ev?ev.description||'':'';
  document.getElementById('m-event').classList.remove('hidden');
  setTimeout(()=>document.getElementById('em-name').focus(),50);
}
function closeEventModal(){ document.getElementById('m-event').classList.add('hidden'); }
async function saveEvent(){
  const name=document.getElementById('em-name').value.trim();
  if(!name){ toast('Event name is required','error'); return; }
  const body={name,date:document.getElementById('em-date').value,
    venue:document.getElementById('em-venue').value.trim(),
    description:document.getElementById('em-desc').value.trim()};
  if(S.editEventId){ await apiFetch('PUT',`/api/events/${S.editEventId}`,body); toast('Event updated','success'); }
  else { await apiFetch('POST','/api/events',body); toast('Event created!','success'); }
  closeEventModal();
  await loadEvents(); renderHome();
}
async function deleteEvent(id){
  if(!confirm('Delete this event and all its routines and media?')) return;
  await apiFetch('DELETE',`/api/events/${id}`);
  toast('Event deleted','info');
  await loadEvents(); renderHome();
}

// ─── Routine modal ────────────────────────────────────────────────────────────
// ─── Award list state (temporary during modal editing) ────────────────────────
let _pendingAwards = [];

function addAwardToList(){
  const level = document.getElementById('rm-award-level').value;
  const title = document.getElementById('rm-award-title').value.trim();
  if(!level){ return; }
  _pendingAwards.push({ level, title });
  document.getElementById('rm-award-level').value = '';
  document.getElementById('rm-award-title').value = '';
  renderAwardsList();
}
function removeAward(i){
  _pendingAwards.splice(i, 1);
  renderAwardsList();
}
function renderAwardsList(){
  const el = document.getElementById('rm-awards-list');
  if(!el) return;
  if(!_pendingAwards.length){ el.innerHTML=''; return; }
  el.innerHTML = _pendingAwards.map((a,i)=>`
    <div class="award-entry">
      <span class="award-pill ${awardClass(a.level)}">${awardEmoji(a.level)} ${esc(a.level)}${a.title?' · '+esc(a.title):''}</span>
      <button type="button" onclick="removeAward(${i})" class="ml-auto text-ghost hover:text-bloom transition-colors text-sm">✕</button>
    </div>`).join('');
}

function openRoutineModal(k){
  const rt=k?r(k):null;
  S.editRoutineId=rt?rt.id:null;
  document.getElementById('rm-title').textContent=rt?'Edit Routine':'Add Routine';
  document.getElementById('rm-name').value=rt?rt.dancerName:'';
  document.getElementById('rm-studio').value=rt?rt.studio||'':'';
  document.getElementById('rm-age').value=rt?rt.age||'':'';
  document.getElementById('rm-style').value=rt?rt.danceStyle||'':'';
  document.getElementById('rm-order').value=rt?rt.orderNumber||'':'';
  document.getElementById('rm-stage').value=rt?rt.stage||'':'';
  document.getElementById('rm-notes').value=rt?rt.notes||'':'';
  if(rt&&rt.scheduledTime) document.getElementById('rm-time').value=toLocalInput(rt.scheduledTime);
  else if(S.currentEvent&&S.currentEvent.date) document.getElementById('rm-time').value=S.currentEvent.date+'T10:00';
  else document.getElementById('rm-time').value='';
  _pendingAwards = rt && rt.awards ? rt.awards.map(a=>({...a})) : [];
  renderAwardsList();
  document.getElementById('m-routine').classList.remove('hidden');
  setTimeout(()=>document.getElementById('rm-name').focus(),50);
}
function closeRoutineModal(){ document.getElementById('m-routine').classList.add('hidden'); }
async function saveRoutine(){
  const name=document.getElementById('rm-name').value.trim();
  if(!name){ toast('Dancer name is required','error'); return; }
  const timeVal=document.getElementById('rm-time').value;
  const body={dancerName:name,studio:document.getElementById('rm-studio').value.trim(),
    age:document.getElementById('rm-age').value,danceStyle:document.getElementById('rm-style').value,
    scheduledTime:timeVal?new Date(timeVal).toISOString():'',
    stage:document.getElementById('rm-stage').value.trim(),
    orderNumber:document.getElementById('rm-order').value,
    notes:document.getElementById('rm-notes').value.trim(), awards:[..._pendingAwards]};
  if(S.editRoutineId){ await apiFetch('PUT',`/api/routines/${S.editRoutineId}`,body); toast('Routine updated','success'); }
  else { await apiFetch('POST',`/api/events/${S.currentEvent.id}/routines`,body); toast('Routine added!','success'); }
  closeRoutineModal();
  S.routines=await apiFetch('GET',`/api/events/${S.currentEvent.id}/routines`);
  renderSchedule();
}
async function deleteRoutine(id){
  if(!confirm('Remove this routine?')) return;
  await apiFetch('DELETE',`/api/routines/${id}`);
  S.routines=S.routines.filter(r=>r.id!==id);
  renderSchedule(); toast('Routine removed','info');
}
async function deleteMedia(id){
  await apiFetch('DELETE',`/api/media/${id}`);
  S.media=S.media.filter(m=>m.id!==id);
  renderMedia(); toast('Deleted','info');
}

// ─── Settings ─────────────────────────────────────────────────────────────────
async function saveSettings(){
  const token=document.getElementById('s-token').value.trim();
  const user=document.getElementById('s-user').value.trim();
  await apiFetch('PUT','/api/settings',{pushoverToken:token,pushoverUser:user});
  S.settings=await apiFetch('GET','/api/settings');
  toast('Settings saved!','success');
  renderSettings();
}
async function testPush(){
  const r=await apiFetch('POST','/api/settings/test',{});
  if(r.ok) toast('Test sent! Check your phone.','success');
  else toast('Error: '+(r.error||'Check token & user key'),'error');
}

// ─── Share link copy ──────────────────────────────────────────────────────────
function copyShare(key){
  const url=`${location.origin}/share/${key}`;
  navigator.clipboard.writeText(url).then(()=>toast('Share link copied!','success'))
    .catch(()=>{ prompt('Copy this link:',url); });
}

// ─── Keyboard ─────────────────────────────────────────────────────────────────
document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){ closeEventModal(); closeRoutineModal(); closeViewer(); }
  if(!document.getElementById('m-viewer').classList.contains('hidden')){
    if(e.key==='ArrowLeft') stepViewer(-1);
    if(e.key==='ArrowRight') stepViewer(1);
  }
});

// ─── Seated alert ────────────────────────────────────────────────────────────
async function sendSeatedAlert(key) {
  const nameEl = document.getElementById('seated-name');
  const btn = document.getElementById('seated-btn');
  const confirm = document.getElementById('seated-confirm');
  const senderName = nameEl ? nameEl.value.trim() || 'Someone' : 'Someone';
  btn.disabled = true;
  btn.textContent = 'Sending…';
  try {
    const result = await apiFetch('POST', `/api/share/${key}/seated`, { senderName });
    if (result.ok) {
      btn.textContent = '✓ Sent!';
      btn.style.opacity = '0.6';
      confirm.classList.remove('hidden');
      setTimeout(() => {
        btn.textContent = "🪑 I'm in my seat!";
        btn.disabled = false;
        btn.style.opacity = '';
        confirm.classList.add('hidden');
      }, 8000);
    }
  } catch (e) {
    btn.textContent = "🪑 I'm in my seat!";
    btn.disabled = false;
    toast('Could not send notification', 'error');
  }
}

// ─── Boot ─────────────────────────────────────────────────────────────────────
(async function init(){
  const path=location.pathname;
  if(path.startsWith('/share/')){
    await loadShareView(path.split('/')[2]);
  } else {
    await loadEvents();
    renderHome();
  }
})();
</script>
